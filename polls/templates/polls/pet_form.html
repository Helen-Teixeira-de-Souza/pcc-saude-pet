{% extends 'polls/base.html' %}

{% block title %}Cadastro de Pet{% endblock %}

{% block content %}
    <h1>Cadastro de Pet</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{% url 'polls:lista_pets' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
{% endblock %}
</form>
