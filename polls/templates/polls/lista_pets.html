{% extends 'polls/base.html' %}

{% block content %}
    <h1>Meus Pets</h1>

    <p>
        <a href="{% url 'polls:novo_pet' %}" style="display: inline-block; margin-bottom: 16px; padding: 8px 12px; background: #28a745; color: white; text-decoration: none; border-radius: 4px;">
            Cadastrar novo pet
        </a>
    </p>

    {% if lista_pets %}
        <table border="1">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for pet in lista_pets %}
                <tr>
                    <td>
                        <a href="{% url 'polls:detalhes_pet' pet.id %}">{{ pet.nome }}</a>
                    </td>
                    <td>
                        <a href="{% url 'polls:editar_pet' pet.pk %}">Editar</a>
                        <a href="{% url 'polls:deletar_pet' pet.pk %}"
                        onclick="return confirm('Tem certeza?')"
                        style="color: red; margin-left: 10px;">
                            Excluir
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>Nenhum pet cadastrado.</p>
    {% endif %}
{% endblock %}
